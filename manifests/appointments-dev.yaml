apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointments
  namespace: dev
  labels:
    app: appointments
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appointments
  template:
    metadata:
      labels:
        app: appointments
    spec:
      containers:
      - name: appointments
        image: 303670280087.dkr.ecr.us-east-1.amazonaws.com/appointments:latest
        ports:
        - containerPort: 3000
---

apiVersion: v1
kind: Service
metadata:
  name: appointments
  namespace: dev
spec:
  selector:
    app: appointments
  ports:
  - port: 80
    targetPort: 3000
  type: ClusterIP
